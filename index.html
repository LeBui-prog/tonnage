<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tonnage Musculation - EPS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#000;
color:#39FF14;
font-family: monospace;
}

.neon{
text-shadow:0 0 5px #39FF14,0 0 10px #39FF14;
}

input{
background:#000;
border:2px solid #39FF14;
color:#39FF14;
padding:10px;
width:100%;
border-radius:8px;
}

button{
background:#39FF14;
color:#000;
font-weight:bold;
padding:12px;
border-radius:10px;
width:100%;
margin-top:10px;
}

button:hover{
background:#00ff88;
}

.card{
border:2px solid #39FF14;
padding:16px;
border-radius:12px;
margin-top:16px;
}
</style>
</head>

<body class="p-4">

<h1 class="text-2xl text-center neon mb-4">
🏋️ CALCULATEUR TONNAGE EPS
</h1>

<!-- ETAPE 1 -->

<div class="card">

<h2 class="text-xl neon mb-3">⚡ Planification</h2>

<div class="space-y-2">

<input id="rm" type="number" placeholder="RM (charge maximale kg)">

<input id="pmax" type="number" placeholder="% Max RM (ex : 80)">

<input id="pmin" type="number" placeholder="% Min RM (ex : 60)">

<input id="series" type="number" placeholder="Nombre de séries">

<input id="reps" type="number" placeholder="Nombre de répétitions">

<button onclick="calculTheorique()">
Calculer tonnage théorique
</button>

</div>

<div id="resultTheorique" class="mt-4 text-lg"></div>

</div>

<!-- ETAPE 2 -->

<div class="card">

<h2 class="text-xl neon mb-3">🎮 Exercice Réalisé</h2>

<div id="seriesContainer" class="space-y-3"></div>

<button onclick="calculReel()">Calculer tonnage réalisé</button>

<div id="resultReel" class="mt-4 text-lg"></div>

</div>

<script>

let nbSeries = 0

function calculTheorique(){

const rm = parseFloat(document.getElementById("rm").value)
const pmax = parseFloat(document.getElementById("pmax").value)/100
const pmin = parseFloat(document.getElementById("pmin").value)/100
const series = parseInt(document.getElementById("series").value)
const reps = parseInt(document.getElementById("reps").value)

if(!rm || !series || !reps){
alert("Compléter les champs")
return
}

nbSeries = series

const chargeMax = rm * pmax
const chargeMin = rm * pmin

const tonnageMax = series * reps * chargeMax
const tonnageMin = series * reps * chargeMin

document.getElementById("resultTheorique").innerHTML = `
<div>🔥 Charge max : ${chargeMax.toFixed(1)} kg</div>
<div>🟢 Charge min : ${chargeMin.toFixed(1)} kg</div>
<div class="mt-2">🏆 Tonnage MAX théorique : ${tonnageMax.toFixed(1)} kg</div>
<div>🎯 Tonnage MIN théorique : ${tonnageMin.toFixed(1)} kg</div>
`

genererSeries(series,reps)

}

function genererSeries(series,reps){

const container = document.getElementById("seriesContainer")

container.innerHTML=""

for(let i=1;i<=series;i++){

container.innerHTML+=`

<div class="grid grid-cols-2 gap-2">

<input type="number" id="charge${i}" placeholder="Série ${i} charge (kg)">

<input type="number" id="rep${i}" placeholder="Série ${i} reps" value="${reps}">

</div>

`

}

}

function calculReel(){

let tonnage=0

for(let i=1;i<=nbSeries;i++){

const charge=parseFloat(document.getElementById(`charge${i}`).value)
const reps=parseFloat(document.getElementById(`rep${i}`).value)

if(charge && reps){
tonnage += charge*reps
}

}

document.getElementById("resultReel").innerHTML = `
🏋️ Tonnage réalisé : <span class="text-2xl">${tonnage.toFixed(1)} kg</span>
`

}

</script>

</body>
</html>

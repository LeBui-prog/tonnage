<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonnage STAPS Reims</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bibliothèques pour la génération PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { 
            background: #000; 
            color: #39FF14; 
            font-family: 'Courier New', Courier, monospace; 
            padding-bottom: 110px; 
        }
        .neon { text-shadow: 0 0 5px #39FF14, 0 0 10px #39FF14; }
        
        input { 
            background: #111; 
            border: 1px solid #39FF14; 
            color: #39FF14; 
            padding: 12px; 
            width: 100%; 
            border-radius: 8px; 
            outline: none; 
            margin-bottom: 10px;
        }
        button { 
            background: #39FF14; 
            color: #000; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 10px; 
            width: 100%; 
            transition: all 0.2s; 
            text-transform: uppercase; 
        }
        button:active { transform: scale(0.98); }
        .card { 
            border: 2px solid #39FF14; 
            padding: 20px; 
            border-radius: 15px; 
            margin-top: 20px; 
            background: rgba(57, 255, 20, 0.05); 
        }
        .serie-item { 
            border-left: 4px solid #39FF14; 
            background: #0a0a0a; 
            margin-bottom: 12px; 
            padding: 12px; 
            border-radius: 0 8px 8px 0;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #000; }
        th, td { border: 1px solid #39FF14; padding: 10px; text-align: center; font-size: 0.85rem; }
        th { background: rgba(57, 255, 20, 0.2); }
        label { font-size: 0.65rem; text-transform: uppercase; margin-bottom: 2px; display: block; opacity: 0.8; }
        
        #monitoringBar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #000;
            border-top: 2px solid #39FF14;
            display: none;
            z-index: 50;
            overflow: hidden;
            height: 70px;
        }

        #timerOverlay {
            display: none;
            width: 100%;
            height: 100%;
        }

        .split-bar {
            display: flex;
            height: 100%;
            align-items: stretch;
        }

        .left-panel {
            width: 30%;
            background: #fff;
            color: #dc2626;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 2px solid #dc2626;
            padding: 2px;
            text-align: center;
        }

        .right-panel {
            width: 70%;
            background: #dc2626;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .medal-card {
            background: linear-gradient(145deg, #111, #222);
            border: 2px solid #39FF14;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

    <div class="flex justify-center items-center mb-6">
        <h1 class="text-xl font-bold neon text-center">TONNAGE STAPS REIMS</h1>
    </div>

    <!-- 1. PLANIFICATION -->
    <div id="planificationSection" class="card">
        <h2 class="text-lg font-bold mb-4 border-b border-green-900 pb-2 text-center uppercase">📋 Nouvel Atelier</h2>
        <div class="space-y-3">
            <div>
                <label>Atelier</label>
                <input id="workshopName" type="text" placeholder="ex: Squat">
            </div>
            
            <div>
                <label>Valeur de référence (kg)</label>
                <input id="rm" type="number" placeholder="RM (kg)">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label>% RM Min</label>
                    <input id="percentMin" type="number" placeholder="Min %">
                </div>
                <div>
                    <label>% RM Max</label>
                    <input id="percentMax" type="number" placeholder="Max %">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div>
                    <label>Repos (s)</label>
                    <input id="restTime" type="number" placeholder="Repos" value="90">
                </div>
                <div>
                    <label>Séries</label>
                    <input id="series" type="number" placeholder="Séries">
                </div>
                <div>
                    <label>Reps</label>
                    <input id="reps" type="number" placeholder="Reps">
                </div>
            </div>
        </div>
        <!-- Modification du libellé du bouton ici -->
        <button class="mt-4" onclick="genererExercice()">Démarrer l'atelier</button>
    </div>

    <!-- 2. REALISATION -->
    <div id="realisationSection" class="card hidden">
        <div class="flex justify-center items-center mb-4 border-b border-green-900 pb-2">
            <h2 class="text-lg font-bold uppercase text-center" id="displayWorkshopName">EXERCICE</h2>
        </div>
        <div id="seriesContainer"></div>
        <div id="resultReel" class="mt-6"></div>
    </div>

    <!-- 3. BILAN FINAL -->
    <div id="finalSummarySection" class="card hidden">
        <h2 class="text-lg font-bold mb-4 border-b border-green-900 pb-2 text-center uppercase">BILAN DE SÉANCE</h2>
        
        <div id="summaryContent" class="space-y-6"></div>
        
        <!-- Zone Médaille statique -->
        <div id="medalContainer" class="medal-card hidden">
            <div id="medalEmoji" class="text-5xl mb-2"></div>
            <div id="medalTitle" class="text-xl font-black uppercase tracking-widest"></div>
            <div id="medalDesc" class="text-[10px] mt-1 opacity-70"></div>
        </div>

        <div class="mt-8 grid grid-cols-2 gap-4">
            <button class="bg-blue-600 text-white py-4" onclick="exportPDF()">
                Exporter PDF
            </button>
            <button class="bg-white text-black py-4" onclick="resetSeance()">
                Nouvelle Séance
            </button>
        </div>
    </div>

    <!-- BANDEAU DE MONITORING -->
    <div id="monitoringBar">
        <div id="timerOverlay">
            <div class="split-bar">
                <div class="left-panel">
                    <div class="text-[7px] uppercase font-black leading-tight">Tonnage<br>Réalisé</div>
                    <div id="tonnageRestDisplay" class="text-sm font-bold">0 kg</div>
                </div>
                <div class="right-panel">
                    <div class="text-[8px] uppercase font-bold tracking-widest opacity-80 mb-0.5">Repos</div>
                    <div id="timerBigDisplay" class="text-3xl font-bold">00:00</div>
                </div>
            </div>
        </div>
        
        <div id="workStats" class="flex justify-start items-center px-4 h-full">
            <div class="text-left">
                <div class="text-[8px] uppercase opacity-70">Tonnage Réalisé</div>
                <div id="liveTonnage" class="text-xl font-bold neon">0 kg</div>
            </div>
        </div>
    </div>

    <script>
        const appData = { 
            exercices: [],
            currentCibles: { min: 0, max: 0 },
            validatedSeries: new Map() 
        };
        let timerInterval;

        function resetSeance() {
            appData.exercices = [];
            appData.currentCibles = { min: 0, max: 0 };
            appData.validatedSeries.clear();
            if (timerInterval) clearInterval(timerInterval);
            
            document.querySelectorAll('input').forEach(i => {
                if(i.id !== 'restTime') i.value = "";
                else i.value = "90";
            });
            
            const safeSetText = (id, val) => {
                const el = document.getElementById(id);
                if (el) el.innerText = val;
            };

            safeSetText('liveTonnage', "0 kg");
            safeSetText('tonnageRestDisplay', "0 kg");
            safeSetText('timerBigDisplay', "00:00");
            
            const timerEl = document.getElementById('timerBigDisplay');
            if (timerEl) timerEl.classList.remove('animate-pulse');
            
            const resultReel = document.getElementById('resultReel');
            if (resultReel) resultReel.innerHTML = "";
            
            const summaryContent = document.getElementById('summaryContent');
            if (summaryContent) summaryContent.innerHTML = "";

            const medalContainer = document.getElementById('medalContainer');
            if (medalContainer) {
                medalContainer.classList.add('hidden');
                document.getElementById('finalSummarySection').insertBefore(medalContainer, document.querySelector('.grid.grid-cols-2.gap-4'));
            }
            
            document.getElementById('finalSummarySection').classList.add('hidden');
            document.getElementById('realisationSection').classList.add('hidden');
            document.getElementById('monitoringBar').style.display = "none";
            document.getElementById('planificationSection').classList.remove('hidden');
        }

        function updateLiveTonnage() {
            const sInput = document.getElementById('series');
            const s = sInput ? (parseInt(sInput.value) || 0) : 0;
            let currentTotal = 0;
            for(let i=1; i<=s; i++) {
                if (appData.validatedSeries.has(i)) {
                    const data = appData.validatedSeries.get(i);
                    currentTotal += (data.charge * data.reps);
                }
            }
            const txt = `${currentTotal} kg`;
            const liveT = document.getElementById('liveTonnage');
            const restT = document.getElementById('tonnageRestDisplay');
            if (liveT) liveT.innerText = txt;
            if (restT) restT.innerText = txt;
        }

        function genererExercice() {
            const ws = document.getElementById('workshopName').value;
            const rm = parseFloat(document.getElementById('rm').value) || 0;
            const pMin = parseFloat(document.getElementById('percentMin').value) || 0;
            const pMax = parseFloat(document.getElementById('percentMax').value) || 0;
            const s = parseInt(document.getElementById('series').value) || 0;
            const r = parseInt(document.getElementById('reps').value) || 0;

            if (!ws || s <= 0) return;

            appData.currentCibles.min = Math.round((rm * pMin / 100) * s * r);
            appData.currentCibles.max = Math.round((rm * pMax / 100) * s * r);
            appData.validatedSeries.clear();

            document.getElementById('monitoringBar').style.display = "block";
            document.getElementById('workStats').style.display = "flex";
            document.getElementById('timerOverlay').style.display = "none";
            updateLiveTonnage();

            document.getElementById('displayWorkshopName').innerText = ws;
            const container = document.getElementById('seriesContainer');
            container.innerHTML = "";
            
            const chargeMin = (rm * pMin / 100).toFixed(1);

            for(let i=1; i<=s; i++) {
                const isLast = (i === s);
                const buttonLabel = isLast ? "Valider & Terminer" : "Valider";
                const buttonColor = "bg-zinc-800 text-green-500 border-green-500";
                
                container.innerHTML += `
                    <div class="serie-item">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-bold">Série ${i}</span>
                            <button id="btnS${i}" onclick="validerS(${i}, ${isLast})" class="w-32 py-1 text-[10px] border ${buttonColor}">${buttonLabel}</button>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[8px]">Kg</label>
                                <input type="number" id="c${i}" placeholder="Poids" value="${chargeMin}">
                            </div>
                            <div>
                                <label class="text-[8px]">Répétitions</label>
                                <input type="number" id="r${i}" value="${r}">
                            </div>
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('planificationSection').classList.add('hidden');
            document.getElementById('realisationSection').classList.remove('hidden');
        }

        function validerS(idx, isLast) {
            const charge = parseFloat(document.getElementById(`c${idx}`).value) || 0;
            const reps = parseInt(document.getElementById(`r${idx}`).value) || 0;
            appData.validatedSeries.set(idx, { charge, reps });
            const btn = document.getElementById(`btnS${idx}`);
            if (btn) {
                btn.disabled = true;
                btn.innerText = "Série OK";
                btn.className = "w-32 py-1 text-[10px] bg-green-900 text-white border border-green-900";
            }
            updateLiveTonnage();

            if (!isLast) {
                lancerRepos();
            } else {
                masquerRepos();
                finirAtelier();
            }
        }

        function lancerRepos() {
            let timeLeft = parseInt(document.getElementById('restTime').value) || 90;
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('workStats').style.display = "none";
            document.getElementById('timerOverlay').style.display = "block";
            const display = document.getElementById('timerBigDisplay');
            const updateDisplay = () => {
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                if (display) display.innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            };
            updateDisplay();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    if (display) {
                        display.innerText = "REPRISE !";
                        display.classList.add('animate-pulse');
                    }
                }
            }, 1000);
        }

        function masquerRepos() {
            if (timerInterval) clearInterval(timerInterval);
            const tOverlay = document.getElementById('timerOverlay');
            const wStats = document.getElementById('workStats');
            const tDisplay = document.getElementById('timerBigDisplay');
            if (tOverlay) tOverlay.style.display = "none";
            if (wStats) wStats.style.display = "flex";
            if (tDisplay) tDisplay.classList.remove('animate-pulse');
        }

        function finirAtelier() {
            masquerRepos();
            const ws = document.getElementById('workshopName').value;
            let tonnageFinalAtelier = 0;
            let details = [];

            const sortedKeys = Array.from(appData.validatedSeries.keys()).sort((a, b) => a - b);
            sortedKeys.forEach(idx => {
                const data = appData.validatedSeries.get(idx);
                tonnageFinalAtelier += (data.charge * data.reps);
                details.push({ serie: idx, charge: data.charge, reps: data.reps });
            });

            appData.exercices.push({ 
                nom: ws, 
                tonnage: tonnageFinalAtelier,
                cibleMin: appData.currentCibles.min,
                cibleMax: appData.currentCibles.max,
                details: details 
            });

            document.getElementById('monitoringBar').style.display = "none";
            const resReel = document.getElementById('resultReel');
            if (resReel) {
                resReel.innerHTML = `
                    <div class="text-center p-4 border border-green-500 rounded bg-black space-y-4">
                        <div class="text-xl font-bold neon">Atelier enregistré</div>
                        <div class="flex flex-col gap-3">
                            <button class="py-3 bg-blue-600 text-white" onclick="nouvelAtelier()">+ Faire un autre atelier</button>
                            <button class="py-3 bg-white text-black" onclick="afficherBilan()">🏁 Finir et voir le bilan</button>
                        </div>
                    </div>
                `;
                setTimeout(() => {
                    resReel.scrollIntoView({ behavior: 'smooth' });
                }, 100);
            }
        }

        function nouvelAtelier() {
            document.getElementById('workshopName').value = "";
            document.getElementById('rm').value = "";
            document.getElementById('percentMin').value = "";
            document.getElementById('percentMax').value = "";
            document.getElementById('series').value = "";
            document.getElementById('realisationSection').classList.add('hidden');
            document.getElementById('planificationSection').classList.remove('hidden');
            const resReel = document.getElementById('resultReel');
            if (resReel) resReel.innerHTML = "";
            document.getElementById('monitoringBar').style.display = "none";
            masquerRepos();
        }

        function calculerMedaille() {
            const exs = appData.exercices;
            if (exs.length === 0) return null;

            const tousDansZone = exs.every(ex => ex.tonnage >= ex.cibleMin && ex.tonnage <= ex.cibleMax);
            
            if (!tousDansZone) return { type: "chocolat", label: "Médaille de Chocolat", emoji: "🍫", color: "text-amber-800", desc: "Au moins un atelier est hors zone cible." };

            let scoreCumule = 0;
            exs.forEach(ex => {
                let range = ex.cibleMax - ex.cibleMin;
                if (range === 0) range = 1;
                let score = (ex.tonnage - ex.cibleMin) / range;
                scoreCumule += score;
            });
            const scoreMoyen = (scoreCumule / exs.length) * 100;

            if (scoreMoyen >= 70) return { type: "or", label: "Médaille d'Or", emoji: "🥇", color: "text-yellow-400", desc: "Précision exceptionnelle !" };
            if (scoreMoyen >= 35) return { type: "argent", label: "Médaille d'Argent", emoji: "🥈", color: "text-gray-300", desc: "Belle régularité." };
            return { type: "bronze", label: "Médaille de Bronze", emoji: "🥉", color: "text-orange-400", desc: "Objectifs atteints." };
        }

        function afficherBilan() {
            masquerRepos();
            document.getElementById('monitoringBar').style.display = "none";
            document.getElementById('realisationSection').classList.add('hidden');
            document.getElementById('finalSummarySection').classList.remove('hidden');
            
            let totalGeneral = 0;
            let html = "";
            
            appData.exercices.forEach(ex => {
                totalGeneral += ex.tonnage;
                const estDansLaCible = (ex.tonnage >= ex.cibleMin && ex.tonnage <= ex.cibleMax);
                const iconeFeedback = estDansLaCible ? "✅" : "❌";
                const texteFeedback = estDansLaCible ? "Zone Cible Atteinte" : "Hors Zone Cible";
                const couleurFeedback = estDansLaCible ? "text-green-500" : "text-red-500";

                html += `
                    <div class="mb-6 p-3 border ${estDansLaCible ? 'border-green-700' : 'border-red-900'} rounded bg-zinc-950">
                        <div class="flex justify-between items-center mb-1 border-b border-zinc-800 pb-1">
                            <span class="font-bold text-sm uppercase text-green-400">${ex.nom} ${iconeFeedback}</span>
                            <span class="text-xs font-bold ${couleurFeedback}">${ex.tonnage} kg</span>
                        </div>
                        <div class="flex justify-between items-center text-[9px] mb-2 px-1">
                            <span class="opacity-60">Cible : ${ex.cibleMin} - ${ex.cibleMax} kg</span>
                            <span class="${couleurFeedback} font-bold">${texteFeedback}</span>
                        </div>
                        <table class="text-[10px]">
                            <thead>
                                <tr><th class="py-1">Série</th><th class="py-1">Charge</th><th class="py-1">Reps</th><th class="py-1">Total</th></tr>
                            </thead>
                            <tbody>
                                ${ex.details.map(d => `
                                    <tr><td>${d.serie}</td><td>${d.charge} kg</td><td>${d.reps}</td><td class="text-green-500">${d.charge * d.reps} kg</td></tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            });

            html += `
                <div id="totalSeanceBadge" class="p-4 bg-green-500 text-black font-black text-xl rounded-lg shadow-xl uppercase text-center">
                    Total Séance : ${totalGeneral} kg
                </div>
            `;
            
            const summary = document.getElementById('summaryContent');
            if (summary) summary.innerHTML = html;

            const medaille = calculerMedaille();
            const container = document.getElementById('medalContainer');
            if (medaille && container) {
                container.classList.remove('hidden');
                document.getElementById('medalEmoji').innerText = medaille.emoji;
                document.getElementById('medalTitle').innerText = medaille.label;
                document.getElementById('medalTitle').className = `text-xl font-black uppercase tracking-widest ${medaille.color}`;
                document.getElementById('medalDesc').innerText = medaille.desc;
                
                summary.appendChild(container);
            }
        }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const now = new Date();
            const dateStr = now.toLocaleDateString('fr-FR');
            const medaille = calculerMedaille();

            doc.setFont("courier", "bold");
            doc.setFontSize(18);
            doc.setTextColor(34, 197, 94); 
            doc.text("BILAN TONNAGE - STAPS REIMS", 105, 20, { align: "center" });
            
            doc.setFontSize(12);
            doc.setTextColor(0, 0, 0);
            doc.text(`Séance du ${dateStr}`, 105, 30, { align: "center" });

            let currentY = 40;
            let totalGeneral = 0;

            appData.exercices.forEach((ex, index) => {
                totalGeneral += ex.tonnage;
                const estDansLaCible = (ex.tonnage >= ex.cibleMin && ex.tonnage <= ex.cibleMax);
                const status = estDansLaCible ? "VALIDE" : "HORS CIBLE";
                
                doc.setFontSize(11);
                doc.setTextColor(estDansLaCible ? 0 : 200, estDansLaCible ? 100 : 0, 0);
                doc.text(`${index + 1}. ${ex.nom.toUpperCase()} (${status})`, 20, currentY);
                doc.setFontSize(9);
                doc.setTextColor(100);
                doc.text(`Tonnage réalisé : ${ex.tonnage}kg | Cible prévue : ${ex.cibleMin}-${ex.cibleMax}kg`, 20, currentY + 5);
                
                const tableBody = ex.details.map(d => [`Série ${d.serie}`, `${d.charge} kg`, d.reps, `${d.charge * d.reps} kg`]);

                doc.autoTable({
                    startY: currentY + 8,
                    head: [['SÉRIE', 'CHARGE', 'REPS', 'TOTAL']],
                    body: tableBody,
                    theme: 'striped',
                    headStyles: { fillColor: estDansLaCible ? [0, 100, 0] : [150, 0, 0], textColor: [255, 255, 255], halign: 'center' },
                    bodyStyles: { halign: 'center', fontSize: 9 },
                    margin: { horizontal: 20 },
                    styles: { font: 'courier' }
                });

                currentY = doc.lastAutoTable.finalY + 15;
                if (currentY > 250) { doc.addPage(); currentY = 20; }
            });

            doc.setFontSize(14);
            doc.setTextColor(0, 0, 0);
            doc.text(`TONNAGE TOTAL DE LA SÉANCE : ${totalGeneral} kg`, 105, currentY + 10, { align: "center" });
            
            if(medaille) {
                doc.setFontSize(12);
                doc.setTextColor(150, 150, 0);
                doc.text(`RÉCOMPENSE : ${medaille.label.toUpperCase()}`, 105, currentY + 20, { align: "center" });
            }

            doc.save(`Tonnage_Reims_${dateStr.replace(/\//g, '-')}.pdf`);
        }
    </script>
</body>
</html>
